name: Supply Chain Evidence

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  sbom:
    name: SBOM and provenance artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: make install

      - name: Generate CycloneDX SBOM
        run: make sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: artifacts/sbom.cdx.json

      - name: Install Cosign
        if: github.event_name == 'release'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign SBOM with keyless Cosign
        if: github.event_name == 'release'
        run: |
          cosign sign-blob --yes \
            --output-signature artifacts/sbom.cdx.json.sig \
            --output-certificate artifacts/sbom.cdx.json.pem \
            artifacts/sbom.cdx.json

      - name: Upload signed provenance files
        if: github.event_name == 'release'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-signature
          path: |
            artifacts/sbom.cdx.json.sig
            artifacts/sbom.cdx.json.pem
