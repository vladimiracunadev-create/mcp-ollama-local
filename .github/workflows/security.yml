name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.5.21"

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: make install

    - name: Install pip-audit
      run: uv pip install --python .venv/bin/python pip-audit

    - name: Static application security scan
      run: ./.venv/bin/bandit $(find apps host mcp_server -name '*.py' ! -name '._*' -print) main.py -c pyproject.toml

    - name: Dependency vulnerability audit
      # PYSEC-2026-196 affects pip itself (pulled in by pip-audit, not a project
      # dep). It's tracked upstream; ignore until pip-audit ships with pip>=26.1.2.
      run: ./.venv/bin/pip-audit --ignore-vuln PYSEC-2026-196
