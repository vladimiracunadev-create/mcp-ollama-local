name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.5.21"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --frozen

    - name: Lint with Ruff
      run: |
        uv pip install ruff
        uv run ruff check .

    - name: Audit Dependencies
      run: |
        uv pip install pip-audit
        # Audit excluding dev dependencies if possible, or audit the whole venv
        uv run pip-audit

    - name: Scan for secrets (Placeholder for Gitleaks)
      run: |
        echo "Running simplified secret scan..."
        # Check for hardcoded API keys in settings or .env files pattern
        grep -rE "API_KEY=[a-zA-Z0-9]{32,}" . && exit 1 || exit 0
