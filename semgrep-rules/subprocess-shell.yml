rules:
  - id: repo.no-shell-true
    message: "Evita shell=True en subprocess; introduce superficie innecesaria y es contrario al perfil local-first del repo."
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.Popen(..., shell=True, ...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.check_call(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)
    metadata:
      category: command-execution
      confidence: high
      justification: "El repositorio no necesita shell execution abierta para su flujo base."
