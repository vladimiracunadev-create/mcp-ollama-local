apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-ollama-local
  labels:
    app: mcp-ollama-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-ollama-local
  template:
    metadata:
      labels:
        app: mcp-ollama-local
    spec:
      containers:
      - name: app
        image: mcp-ollama-local:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: OLLAMA_URL
          value: "http://host.docker.internal:11434" # Ajustar según tu setup de K8s/Ollama
        - name: DATA_DIR
          value: "/app/data"
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: data-volume
          mountPath: "/app/data"
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: mcp-ollama-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcp-ollama-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
